<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskManagement - ログイン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #0052CC;
      --primary-h: #0747A6;
      --danger:    #DE350B;
      --bg:        #F4F5F7;
      --surface:   #FFFFFF;
      --border:    #DFE1E6;
      --text:      #172B4D;
      --text-sub:  #6B778C;
      --shadow:    0 8px 32px rgba(0,0,0,.18);
      --r-sm: 4px; --r-md: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); font-size: 14px;
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }

    .login-card {
      background: var(--surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      width: 100%; max-width: 380px;
    }

    .login-logo {
      display: flex; justify-content: center; margin-bottom: 16px;
    }

    .login-title {
      font-size: 22px; font-weight: 700; text-align: center;
      color: var(--text); margin-bottom: 6px; letter-spacing: -.01em;
    }

    .login-subtitle {
      font-size: 14px; color: var(--text-sub);
      text-align: center; margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block; font-size: 11px; font-weight: 700; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px;
    }

    input[type="text"], input[type="password"] {
      width: 100%; padding: 9px 12px;
      border: 2px solid var(--border); border-radius: var(--r-sm);
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--surface); outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--primary); }
    input.err   { border-color: var(--danger); }

    .error-msg {
      color: var(--danger); font-size: 13px;
      min-height: 20px; margin-bottom: 4px; display: block;
    }

    .btn-login {
      display: block; width: 100%;
      padding: 10px 16px; margin-top: 8px;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--r-sm);
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background .15s;
    }
    .btn-login:hover { background: var(--primary-h); }

    .login-hint {
      margin-top: 24px; text-align: center;
      font-size: 12px; color: var(--text-sub);
    }
    .login-hint code {
      background: var(--bg); border-radius: 3px;
      padding: 1px 5px; font-family: monospace; color: var(--text);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#0052CC"/>
          <rect x="8" y="9" width="7" height="7" rx="1.5" fill="white"/>
          <rect x="8" y="20" width="7" height="7" rx="1.5" fill="white" opacity=".55"/>
          <rect x="17" y="9" width="11" height="2.5" rx="1.25" fill="white"/>
          <rect x="17" y="13" width="8" height="2.5" rx="1.25" fill="white" opacity=".55"/>
          <rect x="17" y="20" width="11" height="2.5" rx="1.25" fill="white"/>
          <rect x="17" y="24" width="6" height="2.5" rx="1.25" fill="white" opacity=".55"/>
        </svg>
      </div>

      <h1 class="login-title">TaskManagement</h1>
      <p class="login-subtitle">アカウントにログイン</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">ユーザーID</label>
          <input type="text" id="username" placeholder="ユーザーIDを入力" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="パスワードを入力" autocomplete="current-password">
        </div>

        <span id="errorMsg" class="error-msg" role="alert" aria-live="polite"></span>

        <button type="submit" class="btn-login">ログイン</button>
      </form>

      <p class="login-hint">開発用: <code>test</code> / <code>test</code></p>
    </div>
  </div>

  <script>
    /* ===== 既にログイン済みならボードへ ===== */
    if (sessionStorage.getItem('loggedIn') === 'true') location.replace('index.html');

    const MOCK_USERS = [
      { username: 'admin', password: 'password' },
      { username: 'test',  password: 'test' },
    ];

    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (MOCK_USERS.some(u => u.username === username && u.password === password)) {
        sessionStorage.setItem('loggedIn', 'true');
        location.href = 'index.html';
      } else {
        errorMsg.textContent = 'ユーザーIDまたはパスワードが正しくありません';
        document.getElementById('username').classList.add('err');
        document.getElementById('password').classList.add('err');
        document.getElementById('password').value = '';
      }
    });

    /* 入力時にエラー表示をリセット */
    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('errorMsg').textContent = '';
        document.getElementById(id).classList.remove('err');
      });
    });
  </script>
</body>
</html>
